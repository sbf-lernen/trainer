<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SBF Trainer — See &amp; Binnen</title>
<style>
  :root {
    --bg: #f4f6f8; --card: #ffffff; --text: #1a2530; --muted: #5f7285;
    --accent: #0b6bcb; --accent-soft: #e3effb;
    --ok: #1a7f37; --ok-soft: #e6f4ea; --err: #c62828; --err-soft: #fdecea;
    --border: #d8dfe6; --shadow: 0 1px 3px rgba(20,40,60,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10161c; --card: #1a232c; --text: #e8eef4; --muted: #93a4b5;
      --accent: #4d9fef; --accent-soft: #16324e;
      --ok: #4caf6d; --ok-soft: #14331e; --err: #ef6b62; --err-soft: #3d1a17;
      --border: #2c3947; --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    img.qimg { background: #fff; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.45; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px 16px 60px; }
  header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  header h1 { font-size: 1.3rem; margin: 0; cursor: pointer; }
  header .sub { color: var(--muted); font-size: .85rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
          padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  h2 { font-size: 1.05rem; margin: 0 0 10px; }
  button { font: inherit; cursor: pointer; border-radius: 10px; border: 1px solid var(--border);
           background: var(--card); color: var(--text); padding: 10px 14px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.ghost { border: none; background: none; color: var(--accent); padding: 6px 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .seg { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .seg button { border: none; border-radius: 0; padding: 8px 12px; font-size: .9rem; }
  .seg button.on { background: var(--accent); color: #fff; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .78rem;
          background: var(--accent-soft); color: var(--accent); }
  .qtext { font-size: 1.05rem; font-weight: 600; margin: 6px 0 12px; }
  img.qimg { max-width: 100%; height: auto; border-radius: 6px; padding: 6px; margin: 4px 6px 8px 0;
             border: 1px solid var(--border); vertical-align: middle; }
  .answers { display: flex; flex-direction: column; gap: 8px; }
  .ans { text-align: left; padding: 12px 14px; border-radius: 10px; width: 100%;
         display: flex; gap: 10px; align-items: flex-start; }
  .ans .letter { font-weight: 700; color: var(--muted); }
  .ans.correct { background: var(--ok-soft); border-color: var(--ok); }
  .ans.correct .letter { color: var(--ok); }
  .ans.wrong { background: var(--err-soft); border-color: var(--err); }
  .ans.wrong .letter { color: var(--err); }
  .ans.chosen { outline: 2px solid var(--accent); }
  .ans:disabled { cursor: default; opacity: 1; }
  .meta { color: var(--muted); font-size: .82rem; }
  .bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin: 6px 0; }
  .bar > div { height: 100%; background: var(--accent); }
  .bar > div.ok { background: var(--ok); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(34px, 1fr)); gap: 6px; }
  .grid button { padding: 6px 0; font-size: .8rem; border-radius: 8px; }
  .grid button.done { background: var(--accent-soft); border-color: var(--accent); }
  .grid button.cur { background: var(--accent); color: #fff; }
  .big { font-size: 1.6rem; font-weight: 700; }
  .ok-text { color: var(--ok); } .err-text { color: var(--err); }
  .footer-nav { display: flex; justify-content: space-between; gap: 8px; margin-top: 14px; }
  label.opt { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
  select { font: inherit; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
           background: var(--card); color: var(--text); }
  .statrow { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .muted { color: var(--muted); }
  .small { font-size: .85rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 onclick="go('home')">⚓ SBF Trainer</h1>
    <span class="sub">Amtlicher Fragenkatalog (ELWIS, Stand Aug. 2023)</span>
  </header>
  <div id="app"></div>
</div>

<script src="data.js"></script>
<script>
"use strict";

// ---------- Lernstapel & Prüfungen ----------
const DECKS = {
  basis:  { name: "Basisfragen", qs: SBF_DATA.basis, hint: "gelten für See und Binnen" },
  see:    { name: "SBF See — spezifische Fragen", qs: SBF_DATA.see, exam: "see" },
  binnen: { name: "SBF Binnen — spezifische Fragen", qs: SBF_DATA.binnen, exam: "binnen" },
};
const EXAMS = {
  see:    { name: "SBF See",    basis: SBF_DATA.basis, spec: SBF_DATA.see },
  binnen: { name: "SBF Binnen", basis: SBF_DATA.basis, spec: SBF_DATA.binnen },
};

// Prüfungsknoten (praktische Prüfung); Bilder: Wikimedia Commons
const KNOTEN = [
  { id: "K0", name: "Achtknoten", img: "knoten-achtknoten.svg",
    zweck: "Stopperknoten am Ende einer Leine — verhindert das Ausrauschen aus Block, Öse oder Klemme.",
    credit: ["Sawims", "Public Domain", "Achtknoop.svg"] },
  { id: "K1", name: "Kreuzknoten", img: "knoten-kreuzknoten.jpg",
    zweck: "Verbinden zweier gleich starker Leinen.",
    credit: ["Jiver", "Public Domain", "Knoten_Kreuzknoten.jpg"] },
  { id: "K2", name: "Palstek", img: "knoten-palstek.svg",
    zweck: "Bildet ein festes Auge, das sich nicht zuzieht — z.B. zum Festmachen an Poller oder Ring, als Rettungsschlinge.",
    credit: ["Lucasbosch", "CC BY 3.0", "Bowline.svg"] },
  { id: "K3", name: "Webeleinstek", img: "knoten-webeleinstek.svg",
    zweck: "Festmachen einer Leine an Stange, Reling oder Pfahl — z.B. Fender an der Reling.",
    credit: ["Luftpirat", "CC BY-SA 3.0", "Barb._Webeleinenstek01.svg"] },
  { id: "K4", name: "Webeleinstek auf Slip", img: "knoten-webeleinstek.svg",
    zweck: "Wie der Webeleinstek, aber durch die auf Slip gelegte letzte Bucht schnell lösbar — üblich für Fender. (Abbildung ohne Slip — die letzte Bucht als Schlaufe durchstecken.)",
    credit: ["Luftpirat", "CC BY-SA 3.0", "Barb._Webeleinenstek01.svg"] },
  { id: "K5", name: "Stopperstek", img: "knoten-stopperstek.jpg",
    zweck: "Abstoppen und Übernehmen einer unter Zug stehenden Leine — z.B. um eine Anker- oder Schleppleine zu entlasten.",
    credit: ["Markus Bärlocher", "Public Domain", "Stopperstek.jpg"] },
  { id: "K6", name: "Einfacher Schotstek", img: "knoten-schotstek.svg",
    zweck: "Verbinden zweier ungleich starker Leinen.",
    credit: ["Sawims", "Public Domain", "Schootsteek.svg"] },
  { id: "K7", name: "Doppelter Schotstek", img: "knoten-doppelter-schotstek.svg",
    zweck: "Verbinden zweier ungleich starker Leinen — hält sicherer als der einfache Schotstek, besonders bei glattem oder nassem Tauwerk.",
    credit: ["Lucasbosch", "CC BY-SA 3.0", "Double_sheet_bend.svg"] },
  { id: "K8", name: "Rundtörn mit zwei halben Schlägen", img: "knoten-rundtoern.png",
    zweck: "Festmachen einer Leine an Ring, Poller oder Pfahl — lässt sich auch unter Zug belegen und lösen.",
    credit: ["Wikimedia Commons", "CC BY-SA 3.0", "Round_turn_and_two_half_hitches.png"] },
  { id: "K9", name: "Belegen einer Klampe mit Kopfschlag", img: "knoten-kopfschlag.jpg",
    zweck: "Festmachen einer Leine (z.B. Festmacher oder Fall) auf einer Klampe; der Kopfschlag sichert die Leine.",
    credit: ["Schorschi2", "Public Domain", "Kopfschlag_richtig_Pfeil.jpg"] },
];

// ---------- Persistenz ----------
const LS_KEY = "sbf-trainer-v1";
let store = { q: {}, exams: [] };
try { store = Object.assign(store, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch (e) {}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(store)); }
function qstat(id) { return store.q[id] || (store.q[id] = { box: 0, right: 0, wrong: 0 }); }
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function bump(correct) {
  if (!store.days) store.days = {};
  const t = store.days[today()] || (store.days[today()] = { r: 0, w: 0 });
  correct ? t.r++ : t.w++;
}
function streak() {
  if (!store.days) return 0;
  let n = 0;
  const d = new Date();
  if (!store.days[today()]) d.setDate(d.getDate() - 1);
  while (true) {
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    if (!store.days[key]) break;
    n++;
    d.setDate(d.getDate() - 1);
  }
  return n;
}
function errorQueue(deck) {
  return DECKS[deck].qs
    .filter(q => { const s = store.q[q.id]; return s && s.wrong > 0 && s.box < 3; })
    .sort((a, b) => store.q[b.id].wrong - store.q[a.id].wrong);
}

// ---------- Helpers ----------
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n) { return shuffle(arr).slice(0, n); }
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function nl2br(s) { return esc(s).replace(/\n/g, "<br>"); }
function imgs(list) {
  return (list || []).map(f => {
    const src = typeof IMG_DATA !== "undefined" ? IMG_DATA[f] : "images/" + f;
    return `<img class="qimg" src="${src}" alt="Abbildung">`;
  }).join("");
}

const app = document.getElementById("app");
let state = {};

function go(screen, opts) { state = Object.assign({ screen }, opts); render(); }

function render() {
  window.scrollTo(0, 0);
  ({ home: renderHome, learn: renderLearn, exam: renderExam,
     examResult: renderExamResult, stats: renderStats,
     navList: renderNavList, nav: renderNav, knots: renderKnots }[state.screen] || renderHome)();
}

// ---------- Start ----------
function renderHome() {
  const t = (store.days || {})[today()];
  const st = streak();
  const todayLine = (t || st) ? `<div class="card" style="padding:10px 16px">
    <span class="small">${t ? `Heute: <b>${t.r + t.w}</b> Fragen, ${t.r} richtig` : "Heute noch nichts gelernt"}</span>
    ${st ? `<span class="small" style="float:right">🔥 ${st} ${st === 1 ? "Tag" : "Tage"} in Folge</span>` : ""}
  </div>` : "";
  const rows = Object.entries(DECKS).map(([key, c]) => {
    const seen = c.qs.filter(q => { const s = store.q[q.id]; return s && (s.right + s.wrong) > 0; }).length;
    const learned = c.qs.filter(q => (store.q[q.id] || {}).box >= 3).length;
    const errs = errorQueue(key).length;
    return `<div class="card">
      <h2>${c.name} <span class="pill">${c.qs.length} Fragen</span></h2>
      ${c.hint ? `<div class="meta">${c.hint}</div>` : ""}
      <div class="bar"><div class="ok" style="width:${(100 * learned / c.qs.length).toFixed(1)}%"></div></div>
      <div class="meta">${learned} sicher · ${seen} gesehen</div>
      <div class="row" style="margin-top:10px">
        <button class="primary" onclick="startLearn('${key}')">Lernen</button>
        ${c.exam ? `<button onclick="startExam('${c.exam}')">Prüfungssimulation</button>` : ""}
        ${errs ? `<button onclick="startErrors('${key}')">🔁 Fehler üben (${errs})</button>` : ""}
      </div>
    </div>`;
  }).join("");
  const navDone = SBF_DATA.nav.filter(a =>
    a.tasks.every((_, i) => (store.q[`V${a.n}.${i}`] || {}).box >= 3)).length;
  const knotsDone = KNOTEN.filter(k => (store.q[k.id] || {}).box >= 3).length;
  app.innerHTML = todayLine + rows + `
    <div class="card">
      <div class="row">
        <button onclick="go('navList')">🧭 Navigationsaufgaben <span class="meta">${navDone}/${SBF_DATA.nav.length}</span></button>
        <button onclick="startKnots()">🪢 Knoten <span class="meta">${knotsDone}/${KNOTEN.length}</span></button>
      </div>
      <div class="row" style="justify-content:space-between;margin-top:10px">
        <button class="ghost" onclick="go('stats')">📊 Statistik</button>
        <button class="ghost" onclick="resetAll()">Fortschritt zurücksetzen</button>
      </div>
      <p class="meta">Quelle: amtlicher Fragen- und Antwortenkatalog auf
      <a href="https://www.elwis.de/DE/Sportschifffahrt/Sportbootfuehrerscheine/" target="_blank">elwis.de</a>.
      Prüfungsbogen: 30 Fragen (7 Basis + 23 spezifisch), bestanden mit mind. 5 richtigen Basisfragen
      und mind. 18 richtigen spezifischen Fragen. Zur See-Prüfung gehört außerdem eine der
      15 Navigationsaufgaben (siehe oben). Die praktische Prüfung deckt dieses Tool nicht ab.</p>
    </div>`;
}
function resetAll() {
  if (confirm("Gesamten Lernfortschritt löschen?")) { store = { q: {}, exams: [] }; save(); render(); }
}

// ---------- Lernmodus ----------
function startLearn(deck) {
  const c = DECKS[deck];
  const seen = c.qs.filter(q => { const s = store.q[q.id]; return s && (s.right + s.wrong) > 0; }).length;
  const learned = c.qs.filter(q => (store.q[q.id] || {}).box >= 3).length;
  const errs = errorQueue(deck).length;
  app.innerHTML = `<div class="card">
    <h2>${c.name} — Lernen</h2>
    <div class="bar"><div class="ok" style="width:${(100 * learned / c.qs.length).toFixed(1)}%"></div></div>
    <div class="meta">${learned} von ${c.qs.length} sicher · ${seen} gesehen${errs ? ` · <span class="err-text">${errs} Fehler offen</span>` : ""}</div>
    <div style="margin:10px 0">
      <div class="meta" style="margin-bottom:4px">Reihenfolge</div>
      <div class="seg" id="order">
        <button data-v="weak" class="on">Schwächste zuerst</button>
        <button data-v="random">Zufällig</button>
        <button data-v="seq">Der Reihe nach</button>
      </div>
    </div>
    <div class="footer-nav">
      <button class="ghost" onclick="go('home')">← Zurück</button>
      <button class="primary" id="golearn">Los geht's</button>
    </div>
  </div>`;
  document.getElementById("order").addEventListener("click", e => {
    if (e.target.tagName !== "BUTTON") return;
    e.target.parentNode.querySelectorAll("button").forEach(b => b.classList.remove("on"));
    e.target.classList.add("on");
  });
  document.getElementById("golearn").onclick = () => {
    const order = document.querySelector("#order .on").dataset.v;
    let qs = c.qs;
    if (order === "random") qs = shuffle(qs);
    else if (order === "weak") {
      qs = qs.slice().sort((a, b) => {
        const sa = store.q[a.id] || { box: 0, right: 0, wrong: 0 };
        const sb = store.q[b.id] || { box: 0, right: 0, wrong: 0 };
        return (sa.box - sb.box) || (sb.wrong - sa.wrong) || (Math.random() - 0.5);
      });
    }
    go("learn", { deck, queue: qs, idx: 0, answered: null, order: null, nRight: 0, nWrong: 0 });
  };
}

function renderLearn() {
  const q = state.queue[state.idx];
  if (!q) {
    app.innerHTML = `<div class="card"><h2>Runde geschafft! 🎉</h2>
      <p><span class="ok-text">${state.nRight} richtig</span> · <span class="err-text">${state.nWrong} falsch</span></p>
      <div class="row"><button class="primary" onclick="startLearn('${state.deck}')">Neue Runde</button>
      <button onclick="go('home')">Zur Übersicht</button></div></div>`;
    return;
  }
  if (!state.order) state.order = shuffle([0, 1, 2, 3]);
  const s = qstat(q.id);
  const done = state.answered !== null;
  const answersHtml = state.order.map((orig, i) => {
    let cls = "ans";
    if (done) {
      if (orig === 0) cls += " correct";
      else if (i === state.answered) cls += " wrong";
      if (i === state.answered) cls += " chosen";
    }
    const a = q.a[orig];
    return `<button class="${cls}" ${done ? "disabled" : ""} onclick="answerLearn(${i})">
      <span class="letter">${"abcd"[i]}</span><span>${esc(a.t)}${imgs(a.img)}</span></button>`;
  }).join("");
  app.innerHTML = `<div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="pill">${DECKS[state.deck].name} · Frage ${q.n}</span>
      <span class="meta">${state.idx + 1} / ${state.queue.length} ·
        <span class="ok-text">${state.nRight}✓</span> <span class="err-text">${state.nWrong}✗</span></span>
    </div>
    <div class="qtext">${esc(q.q)}</div>
    ${imgs(q.img)}
    <div class="answers">${answersHtml}</div>
    ${done ? `<div class="meta" style="margin-top:8px">Bisher: ${s.right}× richtig, ${s.wrong}× falsch</div>` : ""}
    <div class="footer-nav">
      <button class="ghost" onclick="go('home')">Abbrechen</button>
      ${done ? `<button class="primary" onclick="nextLearn()">Weiter →</button>` : ""}
    </div>
  </div>`;
}
function answerLearn(i) {
  const q = state.queue[state.idx];
  const s = qstat(q.id);
  const correct = state.order[i] === 0;
  if (correct) { s.right++; s.box = Math.min(5, s.box + 1); state.nRight++; }
  else { s.wrong++; s.box = 0; state.nWrong++; }
  bump(correct);
  save();
  state.answered = i;
  render();
}
function nextLearn() { state.idx++; state.answered = null; state.order = null; render(); }

function startErrors(deck) {
  const qs = errorQueue(deck);
  if (!qs.length) return;
  go("learn", { deck, queue: qs, idx: 0, answered: null, order: null, nRight: 0, nWrong: 0 });
}

// ---------- Navigationsaufgaben ----------
function renderNavList() {
  const items = SBF_DATA.nav.map(a => {
    const done = a.tasks.filter((_, i) => (store.q[`V${a.n}.${i}`] || {}).box >= 3).length;
    const tried = a.tasks.filter((_, i) => { const s = store.q[`V${a.n}.${i}`]; return s && (s.right + s.wrong) > 0; }).length;
    return `<div class="statrow">
      <span>Navigationsaufgabe ${a.n}</span>
      <span class="row">
        <span class="meta">${tried ? `${done}/9 sicher` : "neu"}</span>
        <button onclick="startNav(${a.n})">Üben</button>
      </span></div>`;
  }).join("");
  app.innerHTML = `<div class="card">
    <h2>Navigationsaufgaben</h2>
    <p class="small muted">Grundlage ist die amtliche Übungskarte D49 (Mündungen von Jade, Weser
    und Elbe) — Zirkel, Kursdreieck und Karte bereitlegen. In der Prüfung bekommst du eine dieser
    15 Aufgaben mit 9 Teilaufgaben. Du rechnest bzw. zeichnest hier selbst, deckst dann die
    amtliche Lösung auf und bewertest dich ehrlich.</p>
    ${items}
    <div class="footer-nav"><button class="ghost" onclick="go('home')">← Zurück</button></div>
  </div>`;
}
function startNav(n) {
  const aufgabe = SBF_DATA.nav.find(a => a.n === n);
  go("nav", { aufgabe, idx: 0, revealed: false, nRight: 0, nWrong: 0 });
}
function renderNav() {
  const a = state.aufgabe;
  const t = a.tasks[state.idx];
  if (!t) {
    app.innerHTML = `<div class="card"><h2>Aufgabe ${a.n} geschafft! 🎉</h2>
      <p><span class="ok-text">${state.nRight} richtig</span> · <span class="err-text">${state.nWrong} falsch</span> (Selbsteinschätzung)</p>
      <div class="row">
        ${a.n < 15 ? `<button class="primary" onclick="startNav(${a.n + 1})">Aufgabe ${a.n + 1} →</button>` : ""}
        <button onclick="go('navList')">Zur Übersicht</button>
      </div></div>`;
    return;
  }
  const s = store.q[`V${a.n}.${state.idx}`];
  app.innerHTML = `<div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="pill">Navigationsaufgabe ${a.n}</span>
      <span class="meta">Teilaufgabe ${state.idx + 1} / ${a.tasks.length}</span>
    </div>
    <p class="small muted" style="white-space:pre-line">${esc(a.intro)}</p>
    ${a.box ? `<div class="row small" style="margin-bottom:10px">
      <button class="ghost" onclick="toggleNavMap()">${state.showMap ? "🗺 Karte ausblenden" : "🗺 Kartenbereich anzeigen"}</button>
      <a class="small" href="https://map.openseamap.org/?zoom=12&lat=${((a.box[0] + a.box[2]) / 2).toFixed(4)}&lon=${((a.box[1] + a.box[3]) / 2).toFixed(4)}" target="_blank" rel="noopener">auf openseamap.org öffnen</a>
    </div>
    ${state.showMap ? '<div id="navmap" style="height:340px;border-radius:10px;border:1px solid var(--border);margin-bottom:12px"></div>' : ""}` : ""}
    <div class="qtext">${state.idx + 1}. ${nl2br(t.q)}</div>
    ${state.revealed ? `
      <div class="card" style="background:var(--ok-soft);border-color:var(--ok)">
        <div class="small muted">Amtliche Lösung</div>
        <div style="white-space:pre-line"><b>${esc(t.s)}</b></div>
        ${t.s.includes("*)") && a.note ? `<div class="small muted" style="margin-top:6px;white-space:pre-line">${esc(a.note)}</div>` : ""}
      </div>
      <div class="row">Hattest du's richtig?
        <button onclick="navGrade(true)" style="border-color:var(--ok)">✓ Richtig</button>
        <button onclick="navGrade(false)" style="border-color:var(--err)">✗ Falsch</button>
      </div>
      ${s && (s.right + s.wrong) > 0 ? `<div class="meta" style="margin-top:8px">Bisher: ${s.right}× richtig, ${s.wrong}× falsch</div>` : ""}`
    : `<button class="primary" onclick="state.revealed = true; render()">Lösung aufdecken</button>`}
    <div class="footer-nav">
      <button class="ghost" onclick="go('navList')">Abbrechen</button>
      ${state.revealed ? `<button class="ghost" onclick="navNext()">Überspringen →</button>` : ""}
    </div>
  </div>`;
  if (state.showMap && a.box) initNavMap(a.box);
}
let leafletPromise = null;
function loadLeaflet() {
  if (window.L) return Promise.resolve();
  if (!leafletPromise) {
    leafletPromise = new Promise((resolve, reject) => {
      const css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
      document.head.appendChild(css);
      const s = document.createElement("script");
      s.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
      s.onload = resolve;
      s.onerror = () => { leafletPromise = null; reject(); };
      document.head.appendChild(s);
    });
  }
  return leafletPromise;
}
function initNavMap(box) {
  const el = document.getElementById("navmap");
  if (!el) return;
  loadLeaflet().then(() => {
    const map = L.map(el);
    map.fitBounds([[box[0] - 0.03, box[1] - 0.05], [box[2] + 0.03, box[3] + 0.05]]);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      { attribution: "© OpenStreetMap", maxZoom: 18 }).addTo(map);
    L.tileLayer("https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png",
      { attribution: "© OpenSeaMap", maxZoom: 18 }).addTo(map);
  }).catch(() => {
    el.innerHTML = '<p class="small muted" style="padding:10px">Karte konnte nicht geladen werden (offline?). Nutze den OpenSeaMap-Link.</p>';
  });
}
function toggleNavMap() { state.showMap = !state.showMap; render(); }
function navGrade(ok) {
  const s = qstat(`V${state.aufgabe.n}.${state.idx}`);
  if (ok) { s.right++; s.box = Math.min(5, s.box + 1); state.nRight++; }
  else { s.wrong++; s.box = 0; state.nWrong++; }
  bump(ok);
  save();
  navNext();
}
function navNext() { state.idx++; state.revealed = false; render(); }

// ---------- Knoten ----------
function startKnots() {
  go("knots", { queue: shuffle(KNOTEN), idx: 0, revealed: false, nRight: 0, nWrong: 0 });
}
function renderKnots() {
  const k = state.queue[state.idx];
  if (!k) {
    app.innerHTML = `<div class="card"><h2>Alle Knoten durch! 🎉</h2>
      <p><span class="ok-text">${state.nRight} richtig</span> · <span class="err-text">${state.nWrong} falsch</span> (Selbsteinschätzung)</p>
      <div class="row"><button class="primary" onclick="startKnots()">Neue Runde</button>
      <button onclick="go('home')">Zur Übersicht</button></div></div>`;
    return;
  }
  const s = store.q[k.id];
  app.innerHTML = `<div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="pill">Knoten</span>
      <span class="meta">${state.idx + 1} / ${state.queue.length}</span>
    </div>
    <div class="qtext">${esc(k.name)}</div>
    <img class="qimg" src="images/${k.img}" alt="${esc(k.name)}" style="max-height:260px">
    <div class="meta" style="margin-bottom:10px">Bild: ${esc(k.credit[0])} · ${esc(k.credit[1])} ·
      <a href="https://commons.wikimedia.org/wiki/File:${k.credit[2]}" target="_blank" rel="noopener">Wikimedia Commons</a></div>
    <p class="small muted">Knoten mit der Leine stecken und den Verwendungszweck laut aufsagen — beides wird in der Praxisprüfung verlangt.</p>
    ${state.revealed ? `
      <div class="card" style="background:var(--ok-soft);border-color:var(--ok)">
        <div class="small muted">Verwendungszweck</div>
        <div><b>${esc(k.zweck)}</b></div>
      </div>
      <div class="row">Gewusst (Zweck + Knoten gesteckt)?
        <button onclick="knotGrade(true)" style="border-color:var(--ok)">✓ Ja</button>
        <button onclick="knotGrade(false)" style="border-color:var(--err)">✗ Nein</button>
      </div>
      ${s && (s.right + s.wrong) > 0 ? `<div class="meta" style="margin-top:8px">Bisher: ${s.right}× richtig, ${s.wrong}× falsch</div>` : ""}`
    : `<button class="primary" onclick="state.revealed = true; render()">Verwendungszweck aufdecken</button>`}
    <div class="footer-nav">
      <button class="ghost" onclick="go('home')">Abbrechen</button>
      ${state.revealed ? `<button class="ghost" onclick="state.idx++; state.revealed = false; render()">Überspringen →</button>` : ""}
    </div>
  </div>`;
}
function knotGrade(ok) {
  const s = qstat(state.queue[state.idx].id);
  if (ok) { s.right++; s.box = Math.min(5, s.box + 1); state.nRight++; }
  else { s.wrong++; s.box = 0; state.nWrong++; }
  bump(ok);
  save();
  state.idx++;
  state.revealed = false;
  render();
}

// ---------- Prüfungsmodus ----------
const EXAM_MINUTES = 60;
let clockInterval = null;
function startExam(cat) {
  const c = EXAMS[cat];
  const qs = sample(c.basis, 7).concat(sample(c.spec, 23));
  const sheet = qs.map(q => ({ q, order: shuffle([0, 1, 2, 3]), picked: null }));
  go("exam", { cat, sheet, idx: 0, deadline: Date.now() + EXAM_MINUTES * 60000 });
  startClock();
}
function clockText() {
  const left = Math.max(0, state.deadline - Date.now());
  const m = Math.floor(left / 60000), s = Math.floor(left / 1000) % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}
function startClock() {
  clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    if (state.screen !== "exam") { clearInterval(clockInterval); return; }
    if (state.deadline - Date.now() <= 0) {
      clearInterval(clockInterval);
      finishExam(true);
      return;
    }
    const el = document.getElementById("examclock");
    if (el) {
      el.textContent = clockText();
      el.classList.toggle("err-text", state.deadline - Date.now() < 5 * 60000);
    }
  }, 1000);
}
function renderExam() {
  const item = state.sheet[state.idx];
  const q = item.q;
  const answersHtml = item.order.map((orig, i) => {
    const cls = "ans" + (item.picked === i ? " chosen" : "");
    const a = q.a[orig];
    return `<button class="${cls}" onclick="pickExam(${i})">
      <span class="letter">${"abcd"[i]}</span><span>${esc(a.t)}${imgs(a.img)}</span></button>`;
  }).join("");
  const nav = state.sheet.map((it, i) =>
    `<button class="${it.picked !== null ? "done" : ""} ${i === state.idx ? "cur" : ""}"
      onclick="jumpExam(${i})">${i + 1}</button>`).join("");
  const unanswered = state.sheet.filter(it => it.picked === null).length;
  app.innerHTML = `<div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="pill">${EXAMS[state.cat].name} · Prüfungsbogen</span>
      <span class="meta">⏱ <span id="examclock">${clockText()}</span> ·
        ${state.idx < 7 ? "Basisfrage" : "Spezifische Frage"} · Frage ${state.idx + 1} / 30</span>
    </div>
    <div class="qtext">${esc(q.q)}</div>
    ${imgs(q.img)}
    <div class="answers">${answersHtml}</div>
    <div class="footer-nav">
      <button onclick="stepExam(-1)" ${state.idx === 0 ? "disabled" : ""}>← Zurück</button>
      ${state.idx < 29
        ? `<button class="primary" onclick="stepExam(1)">Weiter →</button>`
        : `<button class="primary" onclick="finishExam()">Abgeben</button>`}
    </div>
  </div>
  <div class="card">
    <div class="meta" style="margin-bottom:6px">${unanswered ? unanswered + " Fragen offen" : "Alle Fragen beantwortet"}</div>
    <div class="grid">${nav}</div>
    <div class="footer-nav">
      <button class="ghost" onclick="if(confirm('Prüfung abbrechen?'))go('home')">Abbrechen</button>
      <button onclick="finishExam()">Jetzt abgeben</button>
    </div>
  </div>`;
}
function pickExam(i) {
  state.sheet[state.idx].picked = i;
  if (state.idx < 29) state.idx++;
  render();
}
function jumpExam(i) { state.idx = i; render(); }
function stepExam(d) { state.idx = Math.max(0, Math.min(29, state.idx + d)); render(); }
function finishExam(timeUp) {
  const open = state.sheet.filter(it => it.picked === null).length;
  if (!timeUp && open && !confirm(`Noch ${open} Fragen unbeantwortet — trotzdem abgeben?`)) return;
  clearInterval(clockInterval);
  let basisOk = 0, specOk = 0;
  state.sheet.forEach((it, i) => {
    const correct = it.picked !== null && it.order[it.picked] === 0;
    if (correct) { if (i < 7) basisOk++; else specOk++; }
    const s = qstat(it.q.id);
    if (correct) { s.right++; s.box = Math.min(5, s.box + 1); } else { s.wrong++; s.box = 0; }
    bump(correct);
  });
  const passed = basisOk >= 5 && specOk >= 18;
  store.exams.push({ cat: state.cat, basisOk, specOk, passed, ts: Date.now() });
  save();
  go("examResult", { cat: state.cat, sheet: state.sheet, basisOk, specOk, passed, timeUp: !!timeUp });
}
function renderExamResult() {
  const wrongs = state.sheet.filter(it => !(it.picked !== null && it.order[it.picked] === 0));
  const wrongHtml = wrongs.map(it => {
    const pickedTxt = it.picked === null ? "— nicht beantwortet —" : it.q.a[it.order[it.picked]].t;
    return `<div class="card">
      <div class="meta">Frage ${it.q.n}</div>
      <div class="qtext">${esc(it.q.q)}</div>${imgs(it.q.img)}
      <div class="small err-text">Deine Antwort: ${esc(pickedTxt)}${it.picked !== null ? imgs(it.q.a[it.order[it.picked]].img) : ""}</div>
      <div class="small ok-text">Richtig: ${esc(it.q.a[0].t)}${imgs(it.q.a[0].img)}</div>
    </div>`;
  }).join("");
  app.innerHTML = `<div class="card" style="text-align:center">
    <div class="big ${state.passed ? "ok-text" : "err-text"}">${state.passed ? "Bestanden ✔" : "Nicht bestanden ✘"}</div>
    ${state.timeUp ? '<p class="err-text small">⏱ Zeit abgelaufen — der Bogen wurde automatisch abgegeben.</p>' : ""}
    <p>Basisfragen: <b>${state.basisOk} / 7</b> (mind. 5) · Spezifische: <b>${state.specOk} / 23</b> (mind. 18)</p>
    <div class="row" style="justify-content:center">
      <button class="primary" onclick="startExam('${state.cat}')">Neuer Bogen</button>
      <button onclick="go('home')">Zur Übersicht</button>
    </div>
  </div>
  ${wrongs.length ? `<h2 style="margin:16px 4px 8px">Falsch beantwortet (${wrongs.length})</h2>` + wrongHtml : ""}`;
}

// ---------- Statistik ----------
function renderStats() {
  const partBar = (label, qs) => {
    if (!qs.length) return "";
    const learned = qs.filter(q => (store.q[q.id] || {}).box >= 3).length;
    return `<div class="statrow small"><span style="min-width:110px">${label}</span>
      <span class="bar" style="flex:1;margin:0 10px">
        <div class="ok" style="width:${(100 * learned / qs.length).toFixed(1)}%"></div></span>
      <span class="meta">${learned}/${qs.length}</span></div>`;
  };
  const catHtml = Object.entries(DECKS).map(([key, c]) => {
    const hard = c.qs
      .filter(q => (store.q[q.id] || {}).wrong >= 2)
      .sort((a, b) => store.q[b.id].wrong - store.q[a.id].wrong).slice(0, 5);
    return `<div class="card">
      <h2>${c.name}</h2>
      ${partBar("Fragen", c.qs)}
      ${hard.length ? `<div class="small" style="margin-top:8px"><b>Problemfragen:</b>
        ${hard.map(q => `<div class="statrow"><span>Frage ${q.n}: ${esc(q.q.slice(0, 60))}…</span>
          <span class="err-text">${store.q[q.id].wrong}✗</span></div>`).join("")}</div>` : ""}
    </div>`;
  }).join("");
  const navQs = SBF_DATA.nav.flatMap(a => a.tasks.map((_, i) => ({ id: `V${a.n}.${i}` })));
  const navHtml = `<div class="card"><h2>Navigationsaufgaben</h2>${partBar("Teilaufgaben", navQs)}</div>
    <div class="card"><h2>Knoten</h2>${partBar("Verwendungszwecke", KNOTEN)}</div>`;
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    days.push({ key, ...((store.days || {})[key] || { r: 0, w: 0 }) });
  }
  const maxDay = Math.max(1, ...days.map(d => d.r + d.w));
  const weekHtml = `<div class="card"><h2>Letzte 7 Tage ${streak() ? `· 🔥 ${streak()} in Folge` : ""}</h2>
    ${days.map(d => `<div class="statrow small">
      <span style="min-width:110px">${new Date(d.key + "T12:00").toLocaleDateString("de-DE", { weekday: "short", day: "numeric", month: "numeric" })}</span>
      <span class="bar" style="flex:1;margin:0 10px"><div class="${d.r + d.w ? "ok" : ""}" style="width:${(100 * (d.r + d.w) / maxDay).toFixed(1)}%"></div></span>
      <span class="meta">${d.r + d.w ? `${d.r + d.w} (${d.r}✓)` : "–"}</span></div>`).join("")}
  </div>`;
  const catAndNavHtml = catHtml + navHtml + weekHtml;
  const exams = (store.exams || []).slice(-10).reverse().map(e =>
    `<div class="statrow"><span>${EXAMS[e.cat].name} · ${new Date(e.ts).toLocaleDateString("de-DE")}</span>
     <span class="${e.passed ? "ok-text" : "err-text"}">${e.basisOk + e.specOk}/30 ${e.passed ? "bestanden" : "durchgefallen"}</span></div>`).join("");
  app.innerHTML = catAndNavHtml + `<div class="card"><h2>Letzte Prüfungsbögen</h2>
    ${exams || '<span class="muted">Noch keine Prüfung simuliert.</span>'}</div>
    <button class="ghost" onclick="go('home')">← Zurück</button>`;
}

render();
</script>
</body>
</html>
